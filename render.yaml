services:
  - type: web
    name: ai-analyst-v3-file-service
    runtime: docker
    plan: free
    region: oregon
    rootDir: file_service
    dockerCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /files/
    buildFilter:
      paths:
        - file_service/**
        - render.yaml

  - type: web
    name: ai-analyst-v3-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend_v3
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: FILE_SERVICE_URL
        value: https://ai-analyst-v3-file-service.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://ai-analyst-v3-web.onrender.com
    buildFilter:
      paths:
        - backend_v3/**
        - render.yaml

  - type: web
    name: ai-analyst-v3-web
    runtime: docker
    plan: free
    region: oregon
    rootDir: web_frontend
    dockerCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ai-analyst-v3-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_SITE_URL
        value: https://ai-analyst-v3-web.onrender.com
    buildFilter:
      paths:
        - web_frontend/**
        - render.yaml
